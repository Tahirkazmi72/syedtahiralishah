<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Syed Tahir Ali Shah - Ph.D. researcher in Mechanical Engineering, embedded IoT, affective computing, and smart mobility." />
  <title>Syed Tahir Ali Shah | Ph.D. Researcher</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
  <link rel="stylesheet" href="assets/css/styles.css?v=20260617-11" />
</head>
<body>
  <nav id="navbar" aria-label="Primary navigation">
    <a class="brand" href="#hero" data-brand>Syed Tahir Ali Shah</a>
    <button class="mobile-toggle" id="mobile-toggle" type="button" aria-label="Open navigation" aria-expanded="false">
      <i class="fas fa-bars" aria-hidden="true"></i>
    </button>
    <div class="nav-links" id="nav-links"></div>
  </nav>

  <header class="hero" id="hero">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content" data-aos="fade-up">
      <span class="hero-subtitle" id="hero-subtitle"></span>
      <h1 id="hero-title">Syed Tahir Ali Shah</h1>
      <p id="hero-summary"></p>
      <div class="hero-actions" id="hero-actions"></div>
    </div>
  </header>

  <main id="app">
    <section id="bio" aria-labelledby="bio-title">
      <div class="bio-container" data-aos="fade-up">
        <div class="bio-image" id="bio-image"></div>
        <div class="bio-text">
          <h2 id="bio-title"></h2>
          <div id="bio-copy"></div>
        </div>
      </div>
    </section>

    <section id="education" aria-labelledby="education-title">
      <div class="section-header" data-aos="fade-up">
        <h2 id="education-title"></h2>
      </div>
      <div class="timeline" id="education-timeline"></div>
    </section>

    <section id="certificates" class="certificate-section is-hidden" aria-labelledby="certificates-title" aria-hidden="true">
      <div class="section-header" data-aos="fade-up">
        <h2 id="certificates-title"></h2>
        <p id="certificates-subtitle"></p>
      </div>
      <div class="certificate-grid" id="certificate-grid" data-aos="fade-up"></div>
    </section>

    <section id="research" aria-labelledby="research-title">
      <div class="section-header" data-aos="fade-up">
        <h2 id="research-title"></h2>
      </div>
      <div class="research-grid" id="research-grid"></div>
    </section>

    <section id="languages" aria-labelledby="languages-title">
      <div class="section-header" data-aos="fade-up">
        <h2 id="languages-title"></h2>
      </div>
      <div class="table-wrapper" data-aos="flip-up">
        <table id="languages-table"></table>
      </div>
    </section>

    <section id="publications" aria-labelledby="publications-title">
      <div class="section-header" data-aos="fade-up">
        <h2 id="publications-title"></h2>
        <p class="section-updated" id="publications-updated"></p>
      </div>
      <div class="publication-tools" data-aos="fade-up">
        <label class="publication-search">
          <i class="fas fa-search" aria-hidden="true"></i>
          <span class="sr-only">Search publications</span>
          <input id="publication-search" type="search" placeholder="Search publications, authors, DOI" autocomplete="off" />
        </label>
        <label class="publication-sort">
          <span>Sort</span>
          <select id="publication-sort">
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
            <option value="title">Title A-Z</option>
            <option value="award">Award first</option>
          </select>
        </label>
      </div>
      <div class="pub-tabs" id="publication-tabs" role="tablist" aria-label="Publication filters" data-aos="fade-up"></div>
      <div id="publication-list" data-aos="fade-up"></div>
    </section>

    <section id="software" aria-labelledby="software-title">
      <div class="section-header" data-aos="fade-up">
        <h2 id="software-title"></h2>
      </div>
      <div class="software-showcase" id="software-showcase"></div>
      <div class="project-block" id="projects">
        <h3 id="projects-title"></h3>
        <div class="research-grid" id="project-grid"></div>
      </div>
    </section>

    <section id="supervision" aria-labelledby="service-title">
      <div class="section-header" data-aos="fade-up">
        <h2 id="service-title"></h2>
      </div>
      <div class="timeline" id="service-timeline"></div>
    </section>

    <section id="contact" aria-labelledby="contact-title">
      <div class="section-header" data-aos="fade-up">
        <h2 id="contact-title"></h2>
        <p id="contact-subtitle"></p>
      </div>
      <div class="contact-grid" id="contact-grid"></div>
      <div class="profile-links" id="profile-links"></div>
    </section>
  </main>

  <footer id="footer">
    <p id="footer-copy"></p>
    <div class="socials" id="footer-socials"></div>
  </footer>

  <div class="certificate-modal" id="certificate-modal" aria-hidden="true">
    <div class="certificate-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="certificate-modal-title">
      <button class="certificate-modal__close" id="certificate-modal-close" type="button" aria-label="Close certificate">
        <i class="fas fa-times" aria-hidden="true"></i>
      </button>
      <h3 id="certificate-modal-title"></h3>
      <div class="certificate-modal__body" id="certificate-modal-body"></div>
      <div class="certificate-modal__actions">
        <a class="btn certificate-modal__link" id="certificate-modal-link" href="#" target="_blank" rel="noopener">
          <i class="fas fa-external-link-alt" aria-hidden="true"></i>
          Open Full Certificate
        </a>
        <a class="btn btn-accent certificate-modal__verify" id="certificate-modal-verify" href="#" target="_blank" rel="noopener">
          <i class="fas fa-check-circle" aria-hidden="true"></i>
          Verify Online
        </a>
      </div>
    </div>
  </div>

  <noscript>
    <section class="noscript-message">
      <h2>JavaScript required</h2>
      <p>This site renders profile data from a JSON content file.</p>
    </section>
  </noscript>

  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script src="assets/js/site.js?v=20260617-11" type="module"></script>
</body>
</html>
